<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Duongoringo</title>

<style>
  body{
    margin:0;
    background:#f7f7f7;
    font-family:sans-serif;
  }

  h1{
    text-align:center;
    padding:20px;
    margin: 0;
    text-transform: uppercase;
  }

  h5{
    text-align:center;
    padding:5px;
    margin: 0 0 20px 0;
    color: #666;
  }

  .unit-divider{
    margin:20px;
    text-align:center;
    font-weight:bold;
    border-top:3px solid #ddd;
    padding-top:15px;
  }

  .path{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding-bottom:50px;
  }

  .node{
    width:90px;
    height:90px;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15);
    transition: transform 0.2s;
  }

  .node:active {
    transform: scale(0.95);
  }

  .node span{
    font-size:12px;
    margin-top:5px;
  }

  .right{
    transform:translateX(70px);
  }
  
  .right:active {
    transform: translateX(70px) scale(0.95);
  }

  .vocab{
    background:#58cc02;
  }

  .sentence{
    background:#1cb0f6;
  }

  .exam{
    background:#ce82ff;
  }

  .topbar{
    display:flex;
    align-items:center;
    padding:15px;
    gap:10px;
  }

  .topbar button{
    border:none;
    background:none;
    font-size:25px;
    cursor:pointer;
  }

  .progress{
    flex:1;
    height:15px;
    background:#ddd;
    border-radius:30px;
    overflow:hidden;
  }

  #bar{
    width:0%;
    height:100%;
    background:#58cc02;
    transition:width .4s ease;
  }

  #quizTitle{
    text-align:center;
    text-transform: uppercase;
    margin: 10px 0;
  }

  .question{
    font-size:35px;
    font-weight:bold;
    text-align:center;
    margin:40px 0;
    transition:.25s;
  }

  .choices{
    padding:15px;
    display:grid;
    gap:15px;
  }

  .choice{
    padding:20px;
    border:2px solid #ddd;
    border-radius:18px;
    background:white;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
  }

  .choice:active{
    transform:scale(.96);
  }

  .fadeOut{
    opacity:0;
    transform:translateY(20px);
  }

  #resultBox{
    position:fixed;
    left:0;
    right:0;
    bottom:-250px;
    padding:24px;
    box-shadow: 0 -10px 30px rgba(0,0,0,.15);
    transition:.3s ease;
    color:white;
    text-align:center;
    border-radius:25px 25px 0 0;
    z-index:999;
  }

  #resultBox.show{
    bottom:0;
  }

  #resultBox button{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    margin-top:18px;
    transition:.15s;
    background:rgba(255,255,255,.2);
    color:white;
    backdrop-filter:blur(8px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.2),
      0 3px 8px rgba(0,0,0,.15);
  }

  #resultBox button:hover{
    transform:translateY(-1px);
  }

  #resultBox button:active{
    transform:scale(.97);
  }

  .resultTitle{
    font-size:24px;
    font-weight:bold;
  }
</style>
</head>
<body>

<div id="home">
  <h1>Duongoringo</h1>
  <h5>made by 2than</h5>

  <div class="unit-divider">
    <span>2단원 (Nǐ hǎo!)</span>
  </div>

  <div class="path">
    <!-- 단어 노드 3개 -->
    <div class="node vocab" onclick="startQuiz(1,'vocab')">📚<span>단어 1</span></div>
    <div class="node vocab right" onclick="startQuiz(1,'vocab')">📚<span>단어 2</span></div>
    <div class="node vocab" onclick="startQuiz(1,'vocab')">📚<span>단어 3</span></div>
    
    <!-- 문장 노드 3개 -->
    <div class="node sentence right" onclick="startQuiz(1,'sentence')">🗣️<span>문장 1</span></div>
    <div class="node sentence" onclick="startQuiz(1,'sentence')">🗣️<span>문장 2</span></div>
    <div class="node sentence right" onclick="startQuiz(1,'sentence')">🗣️<span>문장 3</span></div>
    
    <!-- 실전 기출 노드 1개 -->
    <div class="node exam" onclick="startQuiz(1,'exam')">🎯<span>실전 1</span></div>
  </div>

  <div class="unit-divider">
    <span>3단원 (Nǐ shì nǎ guó rén?)</span>
  </div>

  <div class="path">
    <!-- 단어 노드 3개 -->
    <div class="node vocab" onclick="startQuiz(2,'vocab')">📚<span>단어 1</span></div>
    <div class="node vocab right" onclick="startQuiz(2,'vocab')">📚<span>단어 2</span></div>
    <div class="node vocab" onclick="startQuiz(2,'vocab')">📚<span>단어 3</span></div>
    
    <!-- 문장 노드 3개 -->
    <div class="node sentence right" onclick="startQuiz(2,'sentence')">🗣️<span>문장 1</span></div>
    <div class="node sentence" onclick="startQuiz(2,'sentence')">🗣️<span>문장 2</span></div>
    <div class="node sentence right" onclick="startQuiz(2,'sentence')">🗣️<span>문장 3</span></div>
    
    <!-- 실전 기출 노드 1개 -->
    <div class="node exam" onclick="startQuiz(2,'exam')">🎯<span>실전 1</span></div>
  </div>
</div>

<div id="quiz" style="display:none;">
  <div class="topbar">
    <button onclick="goHome()">←</button>
    <div class="progress">
      <div id="bar"></div>
    </div>
  </div>

  <h2 id="quizTitle"></h2>
  <div class="question"></div>

</div>

<div id="resultBox"></div>

      { q: "선생님에게 정중하게 높임말로 인사할 때 사용하는 인칭 대명사(您)의 병음은 무엇인가요?", choices: ["nǐ", "nín", "nǐmen", "lǎoshī"], answer: "nín" },
      { q: "헤어질 때 나누는 인사말인 'Míngtiān jiàn'의 뜻은 무엇인가요?", choices: ["안녕하세요", "내일 봐", "잘 가", "감사합니다"], answer: "내일 봐" },

let currentUnit = 1;
let currentType = "vocab";
let questions = [];
let current = 0;

function startQuiz(unit, type){
  currentUnit = unit;
  currentType = type;

  // 전체 데이터셋을 카피해서 섞음
  let fullPool = JSON.parse(JSON.stringify(data[unit][type]));
  shuffle(fullPool);

  // 현재 타입에 맞춰 출제할 문제 수를 조절 (요청하신 개수 적용)
  let maxQuestions = fullPool.length;
  if(type === "vocab") maxQuestions = 3;      // 단어는 무작위 3개 추출
  if(type === "sentence") maxQuestions = 3;   // 문장은 무작위 3개 추출
  if(type === "exam") maxQuestions = 1;       // 실전은 무작위 1개 추출

  // 풀 데이터가 요청 수보다 적을 경우 방어 코드 적용
  if(fullPool.length > maxQuestions) {
    questions = fullPool.slice(0, maxQuestions);
  } else {
    questions = fullPool;
  }

  current = 0;

  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  
  document.getElementById("quizTitle").innerText = `${unit}단원 - ${type.toUpperCase()}`;

  loadQuestion();
}

function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function loadQuestion(){
  if (questions.length === 0) return;
  
  const q = questions[current];
  const questionEl = document.querySelector(".question");

  questionEl.classList.add("fadeOut");

  setTimeout(() => {
    questionEl.innerText = q.q;
    let html = "";

    q.choices.forEach(choice => {
      html += `
        <button class="choice" onclick="checkAnswer('${choice.replace(/'/g, "\\'")}')">
          ${choice}
        </button>
      `;
    });

    document.getElementById("choices").innerHTML = html;
    questionEl.classList.remove("fadeOut");

    document.getElementById("bar").style.width = ((current + 1) / questions.length) * 100 + "%";
  }, 200);
}

function checkAnswer(choice){
  const q = questions[current];
  if(choice === q.answer){
    showResult(true, "🎉 정답입니다!");
  } else {
    showResult(false, `❌ 오답! 정답: ${q.answer}`);
  }
}

function showResult(correct, text){
  const box = document.getElementById("resultBox");
  if(!box) return;

  box.innerHTML = `
    <div class="resultTitle">${text}</div>
    <button onclick="nextQuestion()">다음 문제</button>
  `;

  box.style.background = correct ? "#58CC02" : "#ff4b4b";
  box.classList.add("show");
}

function nextQuestion(){
  document.getElementById("resultBox").classList.remove("show");
  current++;

  if(current >= questions.length){
    setTimeout(() => {
      alert("🏆 해당 단원 학습을 완벽히 끝마쳤습니다!");
      goHome();
    }, 300);
    return;
  }

  loadQuestion();
}

function goHome(){
  // 메인으로 돌아갈 때 결과창 하단 슬라이드바 완벽 삭제
  const box = document.getElementById("resultBox");
  if(box) box.classList.remove("show");

  document.getElementById("quiz").style.display = "none";
  document.getElementById("home").style.display = "block";
  document.getElementById("bar").style.width = "0%";
}
</script>
</body>
</html>
