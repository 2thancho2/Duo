<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DUONGORINGO</title>

<style>
  body{
    margin:0;
    background:#f7f7f7;
    font-family:sans-serif;
  }

  h1{
    text-align:center;
    padding:20px;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  h5{
    text-align:center;
    padding:5px;
    margin: 0 0 20px 0;
    color: #666;
  }

  .unit-divider{
    margin:20px;
    text-align:center;
    font-weight:bold;
    border-top:3px solid #ddd;
    padding-top:15px;
  }

  .path{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding-bottom:50px;
  }

  .node{
    width:90px;
    height:90px;
    border-radius:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,.15);
    transition: transform 0.2s;
  }

  .node:active {
    transform: scale(0.95);
  }

  .node span{
    font-size:12px;
    margin-top:5px;
  }

  .right{
    transform:translateX(70px);
  }
  
  .right:active {
    transform: translateX(70px) scale(0.95);
  }

  .vocab{
    background:#58cc02;
  }

  .sentence{
    background:#1cb0f6;
  }

  .exam{
    background:#ce82ff;
  }

  .topbar{
    display:flex;
    align-items:center;
    padding:15px;
    gap:10px;
  }

  .topbar button{
    border:none;
    background:none;
    font-size:25px;
    cursor:pointer;
  }

  .progress{
    flex:1;
    height:15px;
    background:#ddd;
    border-radius:30px;
    overflow:hidden;
  }

  #bar{
    width:0%;
    height:100%;
    background:#58cc02;
    transition:width .4s ease;
  }

  #quizTitle{
    text-align:center;
    text-transform: uppercase;
    margin: 10px 0;
  }

  .question{
    font-size:26px;
    font-weight:bold;
    text-align:center;
    margin:30px 0 15px 0;
    padding: 0 15px;
    word-break: keep-all;
    line-height: 1.4;
  }

  .quiz-desc {
    text-align: center;
    color: #777;
    font-size: 14px;
    margin-bottom: 30px;
  }

  .sentence-area {
    min-height: 80px;
    margin: 20px;
    padding: 15px;
    border-bottom: 2px dashed #ccc;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    background: #fff;
    border-radius: 12px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }

  .word-pool {
    margin: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 10px;
  }

  .card {
    padding: 12px 20px;
    background: white;
    border: 2px solid #e5e5e5;
    border-radius: 14px;
    font-size: 18px;
    font-weight: bold;
    cursor:pointer;
    box-shadow: 0 3px 0 #e5e5e5;
    transition: all 0.1s;
    user-select: none;
  }

  .card:active {
    transform: translateY(3px);
    box-shadow: 0 0px 0 #e5e5e5;
  }

  .card.used {
    opacity: 0.2;
    cursor: default;
    pointer-events: none;
  }

  .choices{
    padding:15px;
    display:grid;
    gap:15px;
  }

  .choice{
    padding:20px;
    border:2px solid #ddd;
    border-radius:18px;
    background:white;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
    text-align: left;
    padding-left: 25px;
  }

  .choice:active{
    transform:scale(.96);
  }

  .fadeOut{
    opacity:0;
    transform:translateY(20px);
  }

  #resultBox{
    position:fixed;
    left:0;
    right:0;
    bottom:-320px;
    padding:24px;
    box-shadow: 0 -10px 30px rgba(0,0,0,.15);
    transition:.3s ease;
    color:white;
    text-align:center;
    border-radius:25px 25px 0 0;
    z-index:999;
    visibility: hidden;
  }

  #resultBox.show{
    bottom:0;
    visibility: visible;
  }

  #resultBox button{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    margin-top:18px;
    transition:.15s;
    background:rgba(255,255,255,.2);
    color:white;
    backdrop-filter:blur(8px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.2),
      0 3px 8px rgba(0,0,0,.15);
  }

  #resultBox button:hover{
    transform:translateY(-1px);
  }

  #resultBox button:active{
    transform:scale(.97);
  }

  .resultTitle{
    font-size:22px;
    font-weight:bold;
    word-break: keep-all;
  }
</style>
</head>
<body>

<div id="home">
  <h1>DUONGORINGO</h1>
  <h5>made by 2than</h5>

  <!-- 2단원 -->
  <div class="unit-divider"><span>2단원 (Nǐ hǎo!)</span></div>
  <div class="path">
    <div class="node vocab" onclick="startQuiz(2,'vocab','단어')">📚<span>단어</span></div>
    <div class="node sentence right" onclick="startQuiz(2,'sentence','문장')">🗣️<span>문장</span></div>
    <div class="node exam" onclick="startQuiz(2,'exam','실전 기출')">🎯<span>실전 기출</span></div>
  </div>

  <!-- 3단원 -->
  <div class="unit-divider"><span>3단원 (Nǐ de kěshì...)</span></div>
  <div class="path">
    <div class="node vocab" onclick="startQuiz(3,'vocab','단어')">📚<span>단어</span></div>
    <div class="node sentence right" onclick="startQuiz(3,'sentence','문장')">🗣️<span>문장</span></div>
    <div class="node exam" onclick="startQuiz(3,'exam','실전 기출')">🎯<span>실전 기출</span></div>
  </div>

  <!-- 4단원 -->
  <div class="unit-divider"><span>4단원 (Tā shì shéi?)</span></div>
  <div class="path">
    <div class="node vocab" onclick="startQuiz(4,'vocab','단어')">📚<span>단어</span></div>
    <div class="node sentence right" onclick="startQuiz(4,'sentence','문장')">🗣️<span>문장</span></div>
    <div class="node exam" onclick="startQuiz(4,'exam','실전 기출')">🎯<span>실전 기출</span></div>
  </div>

  <!-- 5단원 -->
  <div class="unit-divider"><span>5단원 (Jīntiān jǐ yuè jǐ hào?)</span></div>
  <div class="path">
    <div class="node vocab" onclick="startQuiz(5,'vocab','단어')">📚<span>단어</span></div>
    <div class="node sentence right" onclick="startQuiz(5,'sentence','문장')">🗣️<span>문장</span></div>
    <div class="node exam" onclick="startQuiz(5,'exam','실전 기출')">🎯<span>실전 기출</span></div>
  </div>
</div>

<div id="quiz" style="display:none;">
  <div class="topbar">
    <button onclick="goHome()">←</button>
    <div class="progress">
      <div id="bar"></div>
    </div>
  </div>

  <h2 id="quizTitle"></h2>
  <div class="question"></div>
  <div class="quiz-desc" id="quizDesc"></div>
  
  <div id="quizContent"></div>
</div>

<div id="resultBox"></div>

<script>
const data = {
  2: {
    vocab: [
      { q:"hǎo", choices:["감사합니다","안녕하세요","미안합니다","사랑해요"], answer:"안녕하세요" },
      { q:"nǐ", choices:["나","너","그","그녀"], answer:"너" },
      { q:"zàijiàn", choices:["내일봐","이따봐","잘가","오랜만이야"], answer:"잘가" }
    ],
    sentence: [
      { type: 1, q: "Nǐ hǎo!", tokens: ["안녕", "!"], displayPool: ["안녕", "!", "잘 가", "내일 봐"] },
      { type: 2, q: "안녕!", tokens: ["Nǐ", "hǎo!"], displayPool: ["Nǐ", "hǎo!", "Zàijiàn!", "Wǒ"] },
      { type: 1, q: "Zàijiàn!", tokens: ["잘", "가", "!"], displayPool: ["잘", "가", "!", "만나서", "반가워"] }
    ],
    exam: [
      { q: "제3성 성조 뒤에 제3성이 올 때의 성조 변화 규칙은?", choices: ["제1성으로 변한다", "제2성으로 변한다", "제4성으로 변한다", "성조가 없어진다"], answer: "제2성으로 변한다" }
    ]
  },
  3: {
    vocab: [
      { q: "jiào", choices: ["~라고 부르다", "이름", "무엇", "~이다"], answer: "~라고 부르다" },
      { q: "shénme", choices: ["어느", "나라", "무엇", "사람"], answer: "무엇" },
      { q: "guó", choices: ["나라", "사람", "이름", "친구"], answer: "나라" }
    ],
    sentence: [
      { type: 1, q: "Wǒ shì Hánguórén.", tokens: ["나는", "한국인", "입니다", "."], displayPool: ["나는", "한국인", "입니다", ".", "중국인"] },
      { type: 2, q: "나는 한국인입니다.", tokens: ["Wǒ", "shì", "Hánguórén."], displayPool: ["Wǒ", "shì", "Hánguórén.", "Zhōngguórén", "bú"] },
      { type: 1, q: "Tā hěn shuài!", tokens: ["그는", "매우", "잘생겼다", "!"], displayPool: ["그는", "매우", "잘생겼다", "!", "그녀는"] }
    ],
    exam: [
      { q: "의문문 너의 이름은 무엇이니 문장 뒤에 ma를 쓰지 않는 올바른 이유는?", choices: ["의문대명사 shénme가 이미 있기 때문에", "원래 문장 끝에 ma를 절대 안 써서", "이름을 물어볼 때는 예외라서", "주어가 nǐ이기 때문에"], answer: "의문대명사 shénme가 이미 있기 때문에" }
    ]
  },
  4: {
    vocab: [
      { q: "shéi", choices: ["무엇", "누구", "어디", "어느 것"], answer: "누구" },
      { q: "mèimei", choices: ["언니", "여동생", "남동생", "형"], answer: "여동생" },
      { q: "xiàng", choices: ["닮다", "예쁘다", "크다", "작다"], answer: "닮다" }
    ],
    sentence: [
      { type: 1, q: "Tā shì shéi?", tokens: ["그녀는", "누구니", "?"], displayPool: ["그녀는", "누구니", "?", "내", "동생"] },
      { type: 2, q: "그녀는 누구니?", tokens: ["Tā", "shì", "shéi?"], displayPool: ["Tā", "shì", "shéi?", "wǒ", "mèimei"] },
      { type: 1, q: "Tā  shì wǒ mèimei.", tokens: ["그녀는", "내", "여동생이야", "."], displayPool: ["그녀는", "내", "여동생이야", ".", "형이다"] }
    ],
    exam: [
      { q: "중국어 동사 'yǒu(있다)'의 올바른 부정형 표현은?", choices: ["bù yǒu", "méi yǒu", "bú yǒu", "méi shì"], answer: "méi yǒu" }
    ]
  },
  5: {
    vocab: [
      { q: "jīntiān", choices: ["어제", "오늘", "내일", "모레"], answer: "오늘" },
      { q: "yuè", choices: ["년", "월", "일", "요일"], answer: "월" },
      { q: "hào", choices: ["월", "일(구어)", "요일", "시간"], answer: "일(구어)" }
    ],
    sentence: [
      { type: 1, q: "Jīntiān jǐ yuè jǐ hào?", tokens: ["오늘", "몇 월", "몇 일이야", "?"], displayPool: ["오늘", "몇 월", "몇 일이야", "?", "무슨 요일"] },
      { type: 2, q: "오늘은 몇 월 몇 일이야?", tokens: ["Jīntiān", "jǐ", "yuè", "jǐ", "hào?"], displayPool: ["Jīntiān", "jǐ", "yuè", "jǐ", "hào?", "xīngqī"] },
      { type: 1, q: "Xīngqī jǐ?", tokens: ["무슨", "요일이야", "?"], displayPool: ["무슨", "요일이야", "?", "몇 월", "몇 일"] }
    ],
    exam: [
      { q: "시각 표현에서 시간의 '2시'를 표기할 때 숫자 2(èr) 대신에 사용해야 하는 전용 단어는?", choices: ["èr (二)", "liǎng (两)", "shí (十)", "jǐ (几)"], answer: "liǎng (两)" }
    ]
  }
};

let currentUnit = 2;
let currentType = "vocab";
let questions = [];
let current = 0;
let selectedTokens = [];

function startQuiz(unit, type, displayName){
  currentUnit = unit;
  currentType = type;

  questions = JSON.parse(JSON.stringify(data[unit][type]));
  shuffle(questions);

  if(type === "vocab" || type === "exam") {
    questions.forEach(question => {
      shuffle(question.choices);
    });
  }

  current = 0;

  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  document.getElementById("quizTitle").innerText = `${unit}단원 - ${displayName}`;

  loadQuestion();
}

function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function loadQuestion(){
  if (questions.length === 0) return;
  
  const q = questions[current];
  const questionEl = document.querySelector(".question");
  const descEl = document.getElementById("quizDesc");
  const contentEl = document.getElementById("quizContent");

  questionEl.classList.add("fadeOut");

  setTimeout(() => {
    questionEl.innerText = q.q;
    questionEl.classList.remove("fadeOut");
    
    document.getElementById("bar").style.width = ((current + 1) / questions.length) * 100 + "%";
    
    if(currentType === "sentence") {
      selectedTokens = [];
      if(q.type === 1) {
        descEl.innerText = "💡 문장의 뜻에 맞게 아래 단어 카드를 순서대로 클릭하세요.";
      } else {
        descEl.innerText = "💡 뜻을 보고 중국어 문장 구조에 맞게 카드를 순서대로 클릭하세요.";
      }

      let pool = [...q.displayPool];
      q.tokens.forEach(t => { if(!pool.includes(t)) pool.push(t); });
      shuffle(pool);

      contentEl.innerHTML = `
        <div class="sentence-area" id="assemblyArea"></div>
        <div class="word-pool" id="cardPool"></div>
      `;

      const poolArea = document.getElementById("cardPool");
      pool.forEach((word, idx) => {
        const btn = document.createElement("button");
        btn.className = "card";
        btn.innerText = word;
        btn.id = `card-${idx}`;
        btn.onclick = () => selectCard(word, `card-${idx}`);
        poolArea.appendChild(btn);
      });
      
    } else {
      descEl.innerText = "💡 알맞은 정답을 선택하세요.";
      let html = `<div class="choices">`;
      q.choices.forEach(choice => {
        // 이스케이프 안전 처리
        const safeChoice = choice.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        html += `
          <button class="choice" onclick="checkAnswer('${safeChoice}')">
            ${choice}
          </button>
        `;
      });
      html += `</div>`;
      contentEl.innerHTML = html;
    }
  }, 200);
}

function selectCard(word, cardId) {
  const cardBtn = document.getElementById(cardId);
  if(cardBtn.classList.contains("used")) return;

  cardBtn.classList.add("used");
  selectedTokens.push({ word: word, cardId: cardId });
  
  renderAssembly();
  
  const q = questions[current];
  if(selectedTokens.length === q.tokens.length) {
    checkSentenceAnswer();
  }
}

function renderAssembly() {
  const area = document.getElementById("assemblyArea");
  area.innerHTML = "";
  
  selectedTokens.forEach((item, index) => {
    const span = document.createElement("button");
    span.className = "card";
    span.style.background = "#e1f5fe";
    span.style.borderColor = "#03a9f4";
    span.innerText = item.word;
    span.onclick = () => cancelCard(index);
    area.appendChild(span);
  });
}

function cancelCard(index) {
  const item = selectedTokens[index];
  const cardBtn = document.getElementById(item.cardId);
  if(cardBtn) cardBtn.classList.remove("used");
  
  selectedTokens.splice(index, 1);
  renderAssembly();
}

function checkSentenceAnswer() {
  const q = questions[current];
  let isCorrect = true;
  
  for(let i=0; i<q.tokens.length; i++) {
    if(selectedTokens[i].word !== q.tokens[i]) {
      isCorrect = false;
      break;
    }
  }
  
  if(isCorrect) {
    showResult(true, "🎉 정답입니다! 올바른 문장을 완성했어요.");
  } else {
    showResult(false, `❌ 오답! 정답: ${q.tokens.join(" ")}`);
  }
}

function checkAnswer(choice){
  const q = questions[current];
  if(choice === q.answer){
    showResult(true, "🎉 정답입니다!");
  } else {
    showResult(false, `❌ 오답! 정답: ${q.answer}`);
  }
}

function showResult(correct, text){
  const box = document.getElementById("resultBox");
  if(!box) return;

  box.innerHTML = `
    <div class="resultTitle">${text}</div>
    <button onclick="nextQuestion()">다음 문제</button>
  `;

  box.style.background = correct ? "#58CC02" : "#ff4b4b";
  box.classList.add("show");
}

function nextQuestion(){
  document.getElementById("resultBox").classList.remove("show");
  current++;

  if(current >= questions.length){
    setTimeout(() => {
      alert("🏆 완료! 해당 섹션을 모두 마쳤습니다.");
      goHome();
    }, 300);
    return;
  }

  loadQuestion();
}

function goHome(){
  const box = document.getElementById("resultBox");
  if(box) {
    box.classList.remove("show");
  }

  document.getElementById("quiz").style.display = "none";
  document.getElementById("home").style.display = "block";
  document.getElementById("bar").style.width = "0%";
}
</script>
</body>
</html>
