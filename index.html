<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DUONGORINGO</title>

<style>
  body{
    margin:0;
    background:#f7f7f7;
    font-family:sans-serif;
    color: #3c3c3c;
  }

  .app-container {
    max-width: 600px;
    margin: 0 auto;
    background: #ffffff;
    min-height: 100vh;
    box-shadow: 0 0 20px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }

  h1{
    text-align:center;
    padding: 25px 20px 5px 20px;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 28px;
  }

  h5{
    text-align:center;
    padding:5px;
    margin: 0 0 20px 0;
    color: #aaa;
    font-size: 14px;
  }

  .custom-header {
    background: white;
    border-bottom: 2px solid #e5e5e5;
    padding: 15px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .selector-btn {
    padding: 12px 24px;
    font-size: 15px;
    font-weight: bold;
    border: 2px solid #e5e5e5;
    border-radius: 16px;
    background: white;
    cursor: pointer;
    box-shadow: 0 3px 0 #e5e5e5;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .selector-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #e5e5e5;
  }

  .arrow-icon {
    display: inline-block;
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    font-size: 12px;
    color: #afafaf;
  }

  .selector-btn.open .arrow-icon {
    transform: rotate(180deg);
  }

/* 기존 .dropdown-panel과 .dropdown-panel.show를 찾아서 아래 코드로 완전히 교체하세요 */
.dropdown-panel {
  max-height: 0;
  opacity: 0;
  transform: translateY(-20px); /* 위에서 아래로 살짝 내려오는 느낌 추가 */
  visibility: hidden;
  background: #fafafa;
  border-bottom: 0 solid #e5e5e5;
  transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); /* 가속도 최적화 */
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.dropdown-panel.show {
  max-height: 500px; /* 트리거용 값 유지 */
  opacity: 1;
  transform: translateY(0);
  visibility: visible;
  padding: 20px;
  border-bottom: 2px solid #e5e5e5;
}

  .panel-columns-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .panel-column {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-column label {
    font-size: 11px;
    font-weight: bold;
    color: #999;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }

  .panel-item {
    padding: 12px 6px;
    border: 2px solid #e5e5e5;
    border-radius: 14px;
    background: white;
    font-weight: bold;
    font-size: 13px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 2px 0 #e5e5e5;
    user-select: none;
    word-break: keep-all;
  }

  .panel-item:active {
    transform: translateY(1px);
    box-shadow: 0 1px 0 #e5e5e5;
  }

  .panel-item.active {
    border-color: #1cb0f6;
    color: #1cb0f6;
    background: #f3faff;
    box-shadow: 0 2px 0 #1cb0f6;
  }

  /* 단원 노드 트리 디자인 */
  .unit-divider{
    margin: 30px 20px 20px 20px;
    text-align:center;
    font-size: 18px;
    font-weight:bold;
    border-top:3px solid #f0f0f0;
    padding-top:20px;
    color: #4b4b4b;
  }

  .path{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding-bottom:60px;
  }
/* 기존 .node, .node:active, .right:active를 찾아서 이 코드로 교체 */
.node {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px; /* 원래 28px에서 이모지가 안 깨질 정도로만 살짝 줄임 */
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 0 rgba(0,0,0,.15);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  text-decoration: none;
  user-select: none;
  
  /* 원 밖으로 글자가 절대 탈출하지 못하도록 방어 */
  overflow: hidden;
  text-align: center;
  box-sizing: border-box;
  padding: 4px;
}

.node span { 
  font-size: 11px; /* 원래 12px에서 가독성 유지하며 축소 */
  margin-top: 3px; 
  font-weight: bold; 
  white-space: nowrap; /* 글자가 밑으로 쪼개져서 두 줄 안 되게 강제 고정 */
  word-break: keep-all;
  max-width: 80px; /* 원 내부 가로폭 제한 */
  overflow: hidden;
  text-overflow: ellipsis; /* 혹시나 넘치면 ... 처리 (안전장치) */
}

.node:active { 
  transform: translateY(4px); 
  box-shadow: 0 1px 0 rgba(0,0,0,.15);
}

.right { transform: translateX(65px); }
.right:active { transform: translateX(65px) translateY(4px); }
  .vocab{ background:#58cc02; }
  .sentence{ background:#1cb0f6; }
  .exam{ background:#ce82ff; }

  /* 퀴즈 박스 스타일 */
  .topbar{ display:flex; align-items:center; padding:20px; gap:15px; }
  .topbar button{ border:none; background:none; font-size:25px; cursor:pointer; color: #afafaf; font-weight: bold; }
  .topbar button:hover { color: #3c3c3c; }
  .progress{ flex:1; height:16px; background:#e5e5e5; border-radius:30px; overflow:hidden; }
  #bar{ width:0%; height:100%; background:#58cc02; transition:width .3s ease; }
  
  #quizTitle{ text-align:center; margin: 10px 0; color: #aaa; font-size: 14px; font-weight: bold; letter-spacing: 1px;}
  .question{ font-size:24px; font-weight:bold; text-align:center; margin:25px 0 15px 0; padding: 0 20px; word-break: keep-all; line-height: 1.5; }
  .quiz-desc { text-align: center; color: #777; font-size: 14px; margin-bottom: 25px; padding: 0 24px; word-break: keep-all; }
  
  .sentence-area { min-height: 90px; margin: 20px; padding: 15px; border: 2px dashed #ccc; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: #fafafa; border-radius: 16px; }
  .word-pool { margin: 25px 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
  
  .card { padding: 12px 18px; background: white; border: 2px solid #e5e5e5; border-radius: 14px; font-size: 16px; font-weight: bold; cursor:pointer; box-shadow: 0 3px 0 #e5e5e5; transition: all 0.1s; user-select: none; }
  .card:active { transform: translateY(2px); box-shadow: 0 1px 0 #e5e5e5; }
  .card.used { opacity: 0.15; cursor: default; pointer-events: none; }
  
  .choices{ padding:20px; display:grid; gap:12px; }
  .choice{ padding:18px 22px; border:2px solid #e5e5e5; border-radius:16px; background:white; font-size:17px; font-weight: bold; cursor:pointer; transition: all 0.1s; text-align: left; box-shadow: 0 3px 0 #e5e5e5; }
  .choice:active{ transform:translateY(2px); box-shadow: 0 1px 0 #e5e5e5; border-color: #aaa; }

/* 기존 #resultBox와 #resultBox.show를 찾아서 이 코드로 교체 */
#resultBox { 
  padding: 24px; 
  text-align: center; 
  color: white; 
  border-radius: 20px; 
  margin: 20px; 
  
  /* 부드러운 등장용 초기 상태 설정 */
  display: block; /* 스크립트 에러 방지 */
  opacity: 0;
  transform: translateY(30px); /* 아래에 대기 */
  pointer-events: none; /* 숨겨져 있을 때 클릭 방지 */
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15); 
}

#resultBox.show { 
  opacity: 1; 
  transform: translateY(0); /* 제자리로 슥 올라옴 */
  pointer-events: auto; 
}
  #resultBox button{ width:100%; height:54px; border:none; border-radius:16px; font-size:17px; font-weight:700; cursor:pointer; margin-top:15px; background: white; color: black; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
  #resultBox button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
  .resultTitle{ font-size:20px; font-weight:bold; word-break: keep-all; line-height: 1.4; }
/* 퀴즈 문제 글자 전환용 부드러운 트랜지션 효과 */
.question {
  transition: opacity 0.2s ease, transform 0.2s ease;
  opacity: 1;
  transform: translateY(0);
}

.question.fadeOut {
  opacity: 0;
  transform: translateY(-5px); /* 사라질 때 위로 살짝 올라가는 느낌 */
}
</style>
</head>
<body>

<div class="app-container">
  
  <div id="home">
    <h1>DUONGORINGO</h1>
    <h5>made by 2than</h5>

    <div class="custom-header">
      <button class="selector-btn" id="selectorBtn" onclick="toggleDropdown()">
        <span id="currentSubjectIcon">🇨🇳</span>

        <span class="arrow-icon">▼</span>
      </button>
    </div>

    <div class="dropdown-panel" id="dropdownPanel">
      <div class="panel-columns-grid">
        <div class="panel-column">
          <label>과목</label>
          <div id="subjectGroup"></div>
        </div>
        <div class="panel-column">
          <label>학년 과정</label>
          <div id="gradeGroup"></div>
        </div>
        <div class="panel-column">
          <label>출판사</label>
          <div id="publisherGroup"></div>
        </div>
      </div>
    </div>

    <div id="unitContainer"></div>
  </div>

  <div id="quiz" style="display:none;">
    <div class="topbar">
      <button onclick="goHome()">✕</button>
      <div class="progress">
        <div id="bar"></div>
      </div>
    </div>

    <div id="quizTitle"></div>
    <div class="question"></div>
    <div class="quiz-desc" id="quizDesc"></div>
    
    <div id="quizContent"></div>
    <div id="resultBox"></div>
  </div>

</div>

          { q: "[실전 1] 바닥에 놓여 있는 질량 5kg의 상자를 일정한 힘으로 2m 높이까지 들어 올렸다. 이때 이 사람이 상자에 가한 중력에 대해 한 일의 양은 몇 J인가?", choices: ["10 J", "49 J", "98 J", "196 J"], answer: "98 J" },
          { q: "[실전 2] 지면을 기준으로 질량이 2kg인 물체가 3m 높이에 정지해 있을 때의 '중력에 의한 위치 에너지'는 몇 J인가?", choices: ["6 J", "19.6 J", "29.4 J", "58.8 J"], answer: "58.8 J" },
          { q: "[실전 3] 지면에서 질량이 4kg인 철구가 5 m/s의 속력으로 굴러가고 있다. 이 철구가 가지고 있는 운동 에너지는 몇 J인가?", choices: ["10 J", "20 J", "50 J", "100 J"], answer: "50 J" },
          { q: "[실전 4] 무게가 30N인 물체를 수평 마찰력이 10N인 방바닥 위에서 수평 방향으로 5m만큼 밀고 가다가, 힘들어져서 그 상태로 물체를 들고 수평으로 다시 5m를 걸어갔다. 이 사람이 물체에 한 전체 일의 양은 몇 J인가?", choices: ["50 J", "150 J", "200 J", "300 J"], answer: "50 J" },
          { q: "[실전 5] 1층 지면을 기준으로 위치 에너지가 196J인 질량 2kg짜리 물체가 건물의 어떤 베란다에 놓여 있다. 이 베란다의 지면으로부터의 높이는 몇 m인가?", choices: ["2m", "5m", "10m", "20m"], answer: "10m" },
          { q: "[실전 6] 지면으로부터 20m 높이에서 질량 4kg인 물체를 가만히 떨어뜨려 자유 낙하 시켰다. 이 물체가 정확히 10m 낙하한 지점을 지날 때 물체의 운동 에너지는 몇 J인가? (단, 공기 저항은 무시한다.)", choices: ["196 J", "392 J", "588 J", "784 J"], answer: "392 J" },
          { q: "[실전 7] 어떤 수레가 2m/s의 속력으로 구르고 있다가 속력이 6m/s로 빨라졌다. 속력이 빨라진 후 수레의 운동 에너지는 처음 운동 에너지의 몇 배가 되는가?", choices: ["3배", "4배", "6배", "9배"], answer: "9배" },
          { q: "[실전 8] 질량 2kg인 수레가 수평면 위를 4m/s의 일정한 속력으로 운동하다가 나무 도막과 충돌한 후 나무 도막을 밀어내고 멈추었다. 이때 나무 도막과 바닥 사이의 마찰력이 8N이었다면 나무 도막이 밀려난 거리는 몇 m인가?", choices: ["1m", "2m", "4m", "16m"], answer: "2m" },
          { q: "[실전 9] 책상면의 높이가 방바닥으로부터 1m이다. 질량이 5kg인 책을 책상면으로부터 다시 2m 높이 선반 위로 올려두었다. 방바닥을 기준면으로 삼았을 때 책의 위치 에너지는 몇 J인가?", choices: ["49 J", "98 J", "147 J", "196 J"], answer: "147 J" },
          { q: "[실전 10] 과학에서의 일의 양이 '0(zero)'인 경우를 보기에서 모두 고른 것은? <보기: ㄱ. 가방을 메고 수평 방향으로 걸어갈 때 / ㄴ. 마찰이 없는 얼음판 위에서 썰매가 등속 운동할 때 / ㄷ. 무거운 바위를 힘껏 밀었으나 꿈적도 안 할 때>", choices: ["ㄱ", "ㄱ, ㄷ", "ㄴ, ㄷ", "ㄱ, ㄴ, ㄷ"], answer: "ㄱ, ㄴ, ㄷ" }
        ]
      }
    }
  }

    
  }
};

// 최초 초기값 자동 바인딩 설정
let currentFilters = { subject: 'chinese', grade: 'high', publisher: 'mirae' };
let currentUnit = 1;
let currentType = "vocab";
let questions = [];
let current = 0;
let selectedTokens = [];

function toggleDropdown() {
  const panel = document.getElementById("dropdownPanel");
  const btn = document.getElementById("selectorBtn");
  panel.classList.toggle("show");
  btn.classList.toggle("open");
}

// 핵심 기능: 상위 필터 변화에 연동해 버튼 리스트들을 재생성하는 엔진
function renderDropdownOptions() {
  const subGroup = document.getElementById("subjectGroup");
  const grdGroup = document.getElementById("gradeGroup");
  const pubGroup = document.getElementById("publisherGroup");

  // 1. 과목 리스트 생성
  subGroup.innerHTML = "";
  Object.keys(quizData).forEach(subKey => {
    const meta = subjectMeta[subKey] || { name: subKey, icon: "📚" };
    const activeClass = currentFilters.subject === subKey ? "active" : "";
    subGroup.innerHTML += `<div class="panel-item ${activeClass}" onclick="changeSubject('${subKey}')">${meta.icon} ${meta.name}</div>`;
  });

  // 2. 선택된 과목 내에 존재하는 학년 과정 리스트 추출 및 바인딩
  grdGroup.innerHTML = "";
  const availableGrades = Object.keys(quizData[currentFilters.subject] || {});
  
  // 현재 선택된 학년 과정이 현재 과목에 없다면 첫 번째 과정으로 자동 스위칭
  if (!availableGrades.includes(currentFilters.grade) && availableGrades.length > 0) {
    currentFilters.grade = availableGrades[0];
  }

  availableGrades.forEach(grdKey => {
    const label = gradeMeta[grdKey] || grdKey;
    const activeClass = currentFilters.grade === grdKey ? "active" : "";
    grdGroup.innerHTML += `<div class="panel-item ${activeClass}" onclick="changeGrade('${grdKey}')">${label}</div>`;
  });

  // 3. 선택된 과목 + 학년 조합 내에 존재하는 출판사 리스트 추출 및 바인딩
  pubGroup.innerHTML = "";
  const availablePublishers = Object.keys(quizData[currentFilters.subject]?.[currentFilters.grade] || {});

  // 현재 선택된 출판사가 조건에 없다면 첫 번째 사용 가능한 출판사로 스위칭
  if (!availablePublishers.includes(currentFilters.publisher) && availablePublishers.length > 0) {
    currentFilters.publisher = availablePublishers[0];
  }

  availablePublishers.forEach(pubKey => {
    const label = publisherMeta[pubKey] || pubKey;
    const activeClass = currentFilters.publisher === pubKey ? "active" : "";
    pubGroup.innerHTML += `<div class="panel-item ${activeClass}" onclick="changePublisher('${pubKey}')">${label}</div>`;
  });

  // 탑바 텍스트 동적 동기화 업데이트
  const sMeta = subjectMeta[currentFilters.subject];
  const gName = gradeMeta[currentFilters.grade] || currentFilters.grade;
  const pName = publisherMeta[currentFilters.publisher] || currentFilters.publisher;

  document.getElementById("currentSubjectIcon").innerText = sMeta ? sMeta.icon : "📚";
  document.getElementById("currentSelectionText").innerText = `${sMeta ? sMeta.name : currentFilters.subject} · ${gName} · ${pName}`;
}

function changeSubject(subKey) {
  currentFilters.subject = subKey;
  // 과목이 바뀌면 연쇄 정보 불일치 방지를 위해 하위 옵션 재동기화 연쇄 연출
  renderDropdownOptions();
  updateHomeLayout();
}

function changeGrade(grdKey) {
  currentFilters.grade = grdKey;
  renderDropdownOptions();
  updateHomeLayout();
}

function changePublisher(pubKey) {
  currentFilters.publisher = pubKey;
  renderDropdownOptions();
  toggleDropdown(); // 출판사까지 모두 고르면 자동으로 매뉴창을 닫아줌
  updateHomeLayout();
}

function updateHomeLayout() {
  const container = document.getElementById("unitContainer");
  container.innerHTML = "";

  const currentDataset = quizData[currentFilters.subject]?.[currentFilters.grade]?.[currentFilters.publisher] || {};
  const units = Object.keys(currentDataset).sort((a,b) => a - b);

  if(units.length === 0) {
    container.innerHTML = "<div style='text-align:center; padding:50px 20px; color:#999; font-size:14px;'>해당 매칭 조건에 등록된 단원이 없습니다.<br>상단 바를 눌러 선택지를 변경해 보세요!</div>";
    return;
  }

  units.forEach(unit => {
    const unitDiv = document.createElement("div");
    unitDiv.className = "unit-divider";
    unitDiv.innerHTML = `<span>${unit}단원</span>`;
    container.appendChild(unitDiv);

    const pathDiv = document.createElement("div");
    pathDiv.className = "path";
    pathDiv.innerHTML = `
      <div class="node vocab" onclick="startQuiz(${unit},'vocab','개념 및 단어')">📚<span>개념</span></div>
      <div class="node sentence right" onclick="startQuiz(${unit},'sentence','구조 및 나열')">🗣️<span>나열/매칭</span></div>
      <div class="node exam" onclick="startQuiz(${unit},'exam','실전 기출')">🎯<span>실전 기출</span></div>
    `;
    container.appendChild(pathDiv);
  });
}

function startQuiz(unit, type, displayName){
  currentUnit = unit;
  currentType = type;

  const sourceData = quizData[currentFilters.subject]?.[currentFilters.grade]?.[currentFilters.publisher]?.[unit]?.[type];
  if(!sourceData || sourceData.length === 0) {
    alert("준비된 트레이닝 문항 정보가 비어 있습니다.");
    return;
  }

  questions = JSON.parse(JSON.stringify(sourceData));
  shuffle(questions);

  if(type === "vocab" || type === "exam") {
    questions.forEach(question => { if(question.choices) shuffle(question.choices); });
  }

  current = 0;
  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  document.getElementById("quizTitle").innerText = `${unit}단원 - ${displayName}`;

  loadQuestion();
}

function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function loadQuestion(){
  document.getElementById("resultBox").classList.remove("show");
  if (questions.length === 0) return;
  
  const q = questions[current];
  const questionEl = document.querySelector(".question");
  const descEl = document.getElementById("quizDesc");
  const contentEl = document.getElementById("quizContent");

  questionEl.classList.add("fadeOut");

  setTimeout(() => {
    questionEl.innerText = q.q;
    questionEl.classList.remove("fadeOut");
    document.getElementById("bar").style.width = ((current + 1) / questions.length) * 100 + "%";
    
    if(currentType === "sentence") {
      selectedTokens = [];
      descEl.innerText = "💡 올바른 흐름 결합이 되도록 아래 카드를 순서대로 탭하세요.";

      let pool = [...q.displayPool];
      q.tokens.forEach(t => { if(!pool.includes(t)) pool.push(t); });
      shuffle(pool);

      contentEl.innerHTML = `
        <div class="sentence-area" id="assemblyArea"></div>
        <div class="word-pool" id="cardPool"></div>
      `;

      const poolArea = document.getElementById("cardPool");
      pool.forEach((word, idx) => {
        const btn = document.createElement("button");
        btn.className = "card";
        btn.innerText = word;
        btn.id = `card-${idx}`;
        btn.onclick = () => selectCard(word, `card-${idx}`);
        poolArea.appendChild(btn);
      });
    } else {
      descEl.innerText = "💡 제시된 보기를 읽고 알맞은 정답 카드를 하나 고르세요.";
      let html = `<div class="choices">`;
      q.choices.forEach(choice => {
        const safeChoice = choice.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        html += `<button class="choice" onclick="checkAnswer('${safeChoice}')">${choice}</button>`;
      });
      html += `</div>`;
      contentEl.innerHTML = html;
    }
  }, 150);
}

function selectCard(word, cardId) {
  const cardBtn = document.getElementById(cardId);
  if(cardBtn.classList.contains("used")) return;

  cardBtn.classList.add("used");
  selectedTokens.push({ word: word, cardId: cardId });
  renderAssembly();
  
  if(selectedTokens.length === questions[current].tokens.length) {
    checkSentenceAnswer();
  }
}

function renderAssembly() {
  const area = document.getElementById("assemblyArea");
  area.innerHTML = "";
  selectedTokens.forEach((item, index) => {
    const span = document.createElement("button");
    span.className = "card";
    span.style.background = "#e1f5fe";
    span.style.borderColor = "#03a9f4";
    span.innerText = item.word;
    span.onclick = () => cancelCard(index);
    area.appendChild(span);
  });
}

function cancelCard(index) {
  const item = selectedTokens[index];
  const cardBtn = document.getElementById(item.cardId);
  if(cardBtn) cardBtn.classList.remove("used");
  selectedTokens.splice(index, 1);
  renderAssembly();
}

function checkSentenceAnswer() {
  const q = questions[current];
  let isCorrect = true;
  for(let i=0; i<q.tokens.length; i++) {
    if(selectedTokens[i].word !== q.tokens[i]) { isCorrect = false; break; }
  }
  if(isCorrect) showResult(true, "🎉 정답입니다!");
  else showResult(false, `❌ 오답! 올바른 매칭: [ ${q.tokens.join(" → ")} ]`);
}

function checkAnswer(choice){
  if(choice === questions[current].answer) showResult(true, "🎉 정답입니다!");
  else showResult(false, `❌ 오답! 정답은 [ ${questions[current].answer} ] 입니다.`);
}

function showResult(correct, text){
  const box = document.getElementById("resultBox");
  box.innerHTML = `<div class="resultTitle">${text}</div><button onclick="nextQuestion()">다음 문제</button>`;
  box.style.background = correct ? "#58CC02" : "#ff4b4b";
  box.classList.add("show");
  
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion(){
  document.getElementById("resultBox").classList.remove("show");
  current++;
  if(current >= questions.length){
    setTimeout(() => { alert("🏆 대단해요! 유닛 트레이닝을 마쳤습니다."); goHome(); }, 200);
    return;
  }
  loadQuestion();
}

function goHome(){
  document.getElementById("resultBox").classList.remove("show");
  document.getElementById("quiz").style.display = "none";
  document.getElementById("home").style.display = "block";
  document.getElementById("bar").style.width = "0%";
  updateHomeLayout();
}

document.addEventListener("DOMContentLoaded", function() {
  // 앱 켜질 때 동적 필터 조립기 작동 및 화면 갱신
  renderDropdownOptions();
  updateHomeLayout();
});
</script>

</html>
