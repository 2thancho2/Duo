.screen{
position:absolute;
top:0;
left:0;
width:100%;
min-height:100vh;

transition:.35s ease;
}

.hide{
transform:translateX(100%);
opacity:0;
pointer-events:none;
}

.show{
transform:translateX(0);
opacity:1;
}
#bar{
transition:width .5s ease;
}

@keyframes popIn{

0%{
opacity:0;
transform:scale(.8);
}

100%{
opacity:1;
transform:scale(1);
}

}

.node{
animation:popIn .4s ease;
}

.question{
transition:.25s;
}

.fadeOut{
opacity:0;
transform:translateY(20px);
}

#bar{
transition:width .4s ease;
}

.choice{
transition:.2s;
}

.choice:active{
transform:scale(.96);
}

#resultBox{
position:fixed;
left:0;
right:0;
bottom:-250px;

padding:24px;

box-shadow:
0 -10px 30px rgba(0,0,0,.15);

transition:.3s ease;

color:white;

text-align:center;

border-radius:25px 25px 0 0;

z-index:999;
}

#resultBox.show{
bottom:0;
}

#resultBox button{

width:100%;

height:58px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:700;

cursor:pointer;

margin-top:18px;

transition:.15s;

color:white;

backdrop-filter:blur(8px);

box-shadow:
inset 0 1px 0 rgba(255,255,255,.2),
0 3px 8px rgba(0,0,0,.15);

}

#resultBox button:hover{

transform:translateY(-1px);

}

#resultBox button:active{

transform:scale(.97);

.resultTitle{
font-size:24px;

    q: "발음 쏙쏙 코너의 내용으로, 'a, o, e'로 시작하는 음절을 앞 음절과 구분하기 위해 사용하는 기호(예: kě'ài)의 명칭은 무엇인가요?",
    choices: ["성조부호", "격음부호", "한어병음", "성모"],
    answer: "격음부호"
  },
  {
    q: "'bù'는 뒤에 제4성이 오면 제2성으로 변합니다. '~이 아니다'라는 뜻의 'bú shì'를 발음할 때 'bù'의 성조 변화는 어떠한가요?",
    choices: ["제1성으로 변함", "제2성으로 변함", "제3성으로 변함", "원래대로 제4성으로 발음"],
    answer: "제2성으로 변함"
  },
  {
    q: "교과서 본문에서 김동민이 국적을 답할 때 사용한 표현으로, '한국인'을 뜻하는 중국어 단어는 무엇인가요?",
    choices: ["Zhōngguórén", "Rìběnrén", "Hánguórén", "Měiguórén"],
    answer: "Hánguórén"
  }
]

  }

};
let currentUnit = 1;
let currentType = "vocab";
let questions = [];
let current = 0;

function startQuiz(unit,type){

  currentUnit = unit;
  currentType = type;

  questions =
    [...data[unit][type]];

  shuffle(questions);

  current = 0;

  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="block";

  loadQuestion();
}

function shuffle(array){

  for(let i=array.length-1;i>0;i--){

    const j =
      Math.floor(
        Math.random()*(i+1)
      );

    [array[i],array[j]]
    =
    [array[j],array[i]];

  }

}

function loadQuestion(){

  const q = questions[current];

  const questionEl = document.querySelector(".question");

  questionEl.classList.add("fadeOut");

  setTimeout(()=>{

    questionEl.innerText = q.q;

    let html = "";

    q.choices.forEach(choice=>{

      html += `
      <button class="choice"
      onclick="checkAnswer('${choice}')">
      ${choice}
      </button>
      `;

    });

    document.getElementById("choices").innerHTML = html;

    questionEl.classList.remove("fadeOut");

    document.getElementById("bar").style.width =
      ((current+1)/questions.length)*100 + "%";

  },200);

}

function checkAnswer(choice){

  const q = questions[current];

  if(choice === q.answer){

    showResult(true,"🎉 정답!");

  }else{

    showResult(false,"❌ 정답: " + q.answer);

  }

}

function showResult(correct,text){

  const box =
    document.getElementById("resultBox");

  if(!box){
    console.error("resultBox 없음");
    return;
  }

  box.innerHTML = `
    <div class="resultTitle">
      ${text}
    </div>

    <button onclick="nextQuestion()">
      다음
    </button>
  `;

  box.style.background =
    correct ? "#58CC02" : "#ff4b4b";

  box.classList.add("show");
}

function nextQuestion(){

  document
  .getElementById("resultBox")
  .classList
  .remove("show");

  current++;

  if(current >= questions.length){

    setTimeout(()=>{

      alert("학습 완료!");

      goHome();

    },300);

    return;
  }

  loadQuestion();

}


function goHome(){

  document.getElementById("quiz").style.display = "none";
  document.getElementById("home").style.display = "block";

}
</script>
<div id="resultBox"></div>
</body>
</html>
